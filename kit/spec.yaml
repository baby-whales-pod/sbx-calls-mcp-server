schemaVersion: "1"
kind: mixin
name: mcp-gateway
displayName: MCP Gateway
description: "Connect the sandbox to the local MCP Gateway running on the host (port 9011)"

network:
  allowedDomains:
    - "host.docker.internal:9011"
    - "host.docker.internal:8080"

